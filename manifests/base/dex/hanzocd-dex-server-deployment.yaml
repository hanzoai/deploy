apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: hanzocd-dex-server
    app.kubernetes.io/part-of: hanzocd
    app.kubernetes.io/component: dex-server
  name: hanzocd-dex-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hanzocd-dex-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hanzocd-dex-server
    spec:
      serviceAccountName: hanzocd-dex-server
      initContainers:
      - name: copyutil
        image: ghcr.io/hanzoai/deploy:latest
        imagePullPolicy: Always
        command: [/bin/cp, -n, /usr/local/bin/argocd, /shared/hanzocd-dex]
        volumeMounts:
        - mountPath: /shared
          name: static-files
        - mountPath: /tmp
          name: dexconfig
        securityContext:
          capabilities:
            drop:
            - ALL
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      containers:
      - name: dex
        # renovate: datasource=github-releases depName=dexidp/dex
        image: ghcr.io/dexidp/dex:v2.45.0
        imagePullPolicy: Always
        command: [/shared/hanzocd-dex, rundex]
        env:
          - name: ARGOCD_DEX_SERVER_LOGFORMAT
            valueFrom:
              configMapKeyRef:
                key: dexserver.log.format
                name: hanzocd-cmd-params-cm
                optional: true
          - name: ARGOCD_DEX_SERVER_LOGLEVEL
            valueFrom:
              configMapKeyRef:
                key: dexserver.log.level
                name: hanzocd-cmd-params-cm
                optional: true
          - name: ARGOCD_LOG_FORMAT_TIMESTAMP
            valueFrom:
              configMapKeyRef:
                name: hanzocd-cmd-params-cm
                key: log.format.timestamp
                optional: true
          - name: ARGOCD_DEX_SERVER_DISABLE_TLS
            valueFrom:
              configMapKeyRef:
                name: hanzocd-cmd-params-cm
                key: dexserver.disable.tls
                optional: true
          - name: DEX_CONTINUE_ON_CONNECTOR_FAILURE
            valueFrom:
              configMapKeyRef:
                name: hanzocd-cmd-params-cm
                key: dexserver.connector.failure.continue
                optional: true
        securityContext:
          capabilities:
            drop:
            - ALL
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 5556
        - containerPort: 5557
        - containerPort: 5558
        volumeMounts:
        - mountPath: /shared
          name: static-files
        - mountPath: /tmp
          name: dexconfig
        - mountPath: /tls
          name: hanzocd-dex-server-tls
      volumes:
      - emptyDir: {}
        name: static-files
      - emptyDir: {}
        name: dexconfig
      - name: hanzocd-dex-server-tls
        secret:
          secretName: hanzocd-dex-server-tls
          optional: true
          items:
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
          - key: ca.crt
            path: ca.crt
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 5
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/part-of: hanzocd
              topologyKey: kubernetes.io/hostname
      nodeSelector:
        kubernetes.io/os: linux