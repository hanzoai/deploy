apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: hanzocd-server
    app.kubernetes.io/part-of: hanzocd
    app.kubernetes.io/component: server
  name: hanzocd-server
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - delete  # supports deletion a live object in UI
  - get     # supports viewing live object manifest in UI
  - patch   # supports `hanzocd app patch`
- apiGroups:
  - '*'
  resources:
  - '*/finalizers'
  verbs:
  - update # allows to set metadata.ownerReferences[x].blockOwnerDeletion with OwnerReferencesPermissionEnforcement admission
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - list    # supports listing events in UI
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get     # supports viewing pod logs from UI
- apiGroups:
  - "apps.hanzo.ai"
  resources:
  - "applications"
  - "applicationsets"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create   # supports triggering jobs from UI
